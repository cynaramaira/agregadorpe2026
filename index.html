<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agregador de Pesquisas - Jamildo.com</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .bg-jamildo-blue { background-color: #024796; }
        .bg-jamildo-orange { background-color: #f83d03; }
        .text-jamildo-blue { color: #024796; }
        .text-jamildo-orange { color: #f83d03; }
        .border-jamildo-orange { border-color: #f83d03; }
        .border-jamildo-blue { border-color: #024796; }
        .transition-all { transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 leading-tight">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        
        // Mock autocontido dos ícones Lucide em formato SVG puro para eliminar dependências de CDN instáveis
        const LucideReact = {
            Database: ({ size = 24, className = "" }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <ellipse cx="12" cy="5" rx="9" ry="3"></ellipse>
                    <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path>
                    <path d="M3 12c0 1.66 4 3 9 3s9-1.34 9-3"></path>
                </svg>
            ),
            TrendingUp: ({ size = 24, className = "" }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <polyline points="23 6 13.5 16.5 8.5 11 1 18"></polyline>
                    <polyline points="17 6 23 6 23 12"></polyline>
                </svg>
            ),
            Filter: ({ size = 24, className = "" }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon>
                </svg>
            ),
            Info: ({ size = 24, className = "" }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="16" x2="12" y2="12"></line>
                    <line x1="12" y1="8" x2="12.01" y2="8"></line>
                </svg>
            ),
            ExternalLink: ({ size = 24, className = "" }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                    <polyline points="15 3 21 3 21 9"></polyline>
                    <line x1="10" y1="14" x2="21" y2="3"></line>
                </svg>
            ),
            Users: ({ size = 24, className = "" }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                    <circle cx="9" cy="7" r="4"></circle>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                </svg>
            ),
            LayoutGrid: ({ size = 24, className = "" }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <rect x="3" y="3" width="7" height="7"></rect>
                    <rect x="14" y="3" width="7" height="7"></rect>
                    <rect x="14" y="14" width="7" height="7"></rect>
                    <rect x="3" y="14" width="7" height="7"></rect>
                </svg>
            ),
            BarChart: ({ size = 24, className = "" }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <line x1="18" y1="20" x2="18" y2="10"></line>
                    <line x1="12" y1="20" x2="12" y2="4"></line>
                    <line x1="6" y1="20" x2="6" y2="14"></line>
                </svg>
            ),
            AlertTriangle: ({ size = 24, className = "" }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
                    <line x1="12" y1="9" x2="12" y2="13"></line>
                    <line x1="12" y1="17" x2="12.01" y2="17"></line>
                </svg>
            ),
            RefreshCcw: ({ size = 24, className = "" }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <polyline points="1 4 1 10 7 10"></polyline>
                    <polyline points="23 20 23 14 17 14"></polyline>
                    <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"></path>
                </svg>
            )
        };

        const { Database, TrendingUp, Filter, Info, ExternalLink, Users, LayoutGrid, BarChart, AlertTriangle, RefreshCcw } = LucideReact;

        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTnf0fzqhxBmiOIvX3vXHQsf_JSIbs1ooA_-Wyj5OcQy647rserlTvTVrYO86StVyA0kFeczCcpoqTP/pub?output=csv";

        const BRAND = {
            orange: '#f83d03',
            blue: '#024796',
            logoDark: 'https://jamildo.com/media/uploads/brancologojamildo_6xe6mA0.png'
        };

        const App = () => {
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(true);
            const [view, setView] = useState('dashboard');
            const [displayMode, setDisplayMode] = useState('all');
            const [filterMetodologia, setFilterMetodologia] = useState('Todos');

            const candidates = {
                raquel: { name: 'Raquel Lyra', color: '#9333ea', bg: 'bg-purple-600', initials: 'RL', photo: 'raquel-lyra.webp', active: true },
                joao: { name: 'João Campos', color: '#eab308', bg: 'bg-yellow-500', initials: 'JC', photo: 'joao-campos.jpg', active: true },
                renan: { name: 'Renan Hallais', color: '#0f766e', bg: 'bg-teal-700', initials: 'RH', photo: 'renan-hallais.jpeg', active: true },
                ivan: { name: 'Ivan Moraes', color: '#dc2626', bg: 'bg-red-600', initials: 'IM', photo: 'ivan-moraes.jpeg', active: true },
                eduardo: { 
                    name: 'Eduardo Moura', 
                    color: '#2563eb', 
                    bg: 'bg-blue-600', 
                    initials: 'EM',
                    photo: 'eduardo-moura.jpeg',
                    active: false,
                    note: "Eduardo Moura retirou a pré-candidatura para focar na disputa para a Câmara dos Deputados. O monitor exibe os dados obtidos pelo candidato nas pesquisas publicadas até abril de 2026."
                }
            };

            useEffect(() => {
                fetchData();
            }, []);

            const fetchData = async () => {
                try {
                    const response = await fetch(CSV_URL);
                    const text = await response.text();
                    const rows = text.split('\n').filter(r => r.trim() !== '');
                    
                    if (rows.length < 2) return;

                    const headers = rows[0].split(',').map(c => c.trim().toLowerCase());
                    const dataRows = rows.slice(1);

                    const getIndex = (term) => headers.findIndex(h => h.includes(term));

                    const idxData = getIndex('data');
                    const idxInstituto = getIndex('instituto');
                    const idxRegistro = getIndex('registro') !== -1 ? getIndex('registro') : getIndex('tse');
                    const idxLink = getIndex('link') !== -1 ? getIndex('link') : getIndex('url');
                    
                    const idxRaquel = getIndex('raquel');
                    const idxJoao = getIndex('joão') !== -1 ? getIndex('joão') : getIndex('joao');
                    const idxEduardo = getIndex('eduardo');
                    const idxIvan = getIndex('ivan');
                    const idxRenan = getIndex('renan');
                    
                    const idxBrancos = getIndex('branco') !== -1 ? getIndex('branco') : getIndex('b/n');
                    const idxIndecisos = getIndex('indeciso') !== -1 ? getIndex('indeciso') : getIndex('ns/nr');

                    const parsed = dataRows.map((row, idx) => {
                        const cols = row.split(',').map(c => c.trim());
                        if (cols.length < 5) return null;

                        const parseNum = (index) => {
                            if (index === -1 || !cols[index]) return 0;
                            const n = parseFloat(cols[index].replace(',', '.'));
                            return isNaN(n) ? 0 : n;
                        };

                        const instVal = idxInstituto !== -1 ? cols[idxInstituto] : "";
                        const instValLower = instVal.toLowerCase();
                        
                        let metodo = 'Presencial';
                        if (instValLower.includes('real time') || instValLower.includes('simplex') || instValLower.includes('ipespe')) {
                            metodo = 'Telefone';
                        } else if (instValLower.includes('atlas')) {
                            metodo = 'Internet';
                        }

                        return {
                            id: idx,
                            data: idxData !== -1 ? cols[idxData] : "",
                            instituto: instVal,
                            registro: idxRegistro !== -1 ? cols[idxRegistro] : "",
                            link: idxLink !== -1 ? cols[idxLink] : "",
                            candidatos: {
                                raquel: parseNum(idxRaquel),
                                joao: parseNum(idxJoao),
                                eduardo: parseNum(idxEduardo),
                                ivan: parseNum(idxIvan),
                                renan: parseNum(idxRenan)
                            },
                            brancos: parseNum(idxBrancos),
                            indecisos: idxIndecisos !== -1 ? parseNum(idxIndecisos) : 0,
                            metodologia: metodo,
                            isUnified: instValLower.includes('real time')
                        };
                    }).filter(Boolean);

                    setData(parsed);
                } catch (err) {
                    console.error("Erro na importação.");
                } finally {
                    setLoading(false);
                }
            };

            const filteredData = useMemo(() => {
                const base = filterMetodologia === 'Todos' ? data : data.filter(d => d.metodologia === filterMetodologia);
                return [...base].sort((a, b) => {
                    const dateA = a.data.split('.').reverse().join('-');
                    const dateB = b.data.split('.').reverse().join('-');
                    return new Date(dateA) - new Date(dateB);
                });
            }, [data, filterMetodologia]);

            const institutes = useMemo(() => {
                const list = [...new Set(filteredData.map(d => d.instituto))];
                const latestDates = {};
                list.forEach(inst => {
                    const instData = filteredData.filter(d => d.instituto === inst);
                    const latest = instData[instData.length - 1];
                    latestDates[inst] = new Date(latest.data.split('.').reverse().join('-'));
                });
                return list.sort((a, b) => latestDates[b] - latestDates[a]);
            }, [filteredData]);

            const RenderEvolutionChart = ({ instData, instName }) => {
                const [hoverInfo, setHoverInfo] = useState(null);
                const svgRef = useRef(null);

                const width = 450; 
                const height = 350;
                const padding = 50;
                const rightMargin = 80; 
                const scaleFactor = 4.5;

                const lastData = instData[instData.length - 1];

                const xOffsets = useMemo(() => {
                    if (!lastData) return {};
                    const sortedByY = Object.keys(candidates)
                        .map(key => ({
                            key,
                            y: height - padding - (lastData.candidatos[key] * scaleFactor)
                        }))
                        .sort((a, b) => a.y - b.y);

                    const offsets = {};
                    let currentXShift = 0;
                    sortedByY.forEach((item, i) => {
                        if (i > 0 && Math.abs(item.y - sortedByY[i-1].y) < 22) {
                            currentXShift += 32; 
                        } else {
                            currentXShift = 0;
                        }
                        offsets[item.key] = currentXShift;
                    });
                    return offsets;
                }, [lastData]);

                const getX = (index) => {
                    return instData.length > 1 
                        ? padding + (index * (width - padding - rightMargin) / (instData.length - 1))
                        : (width - rightMargin) / 2;
                };

                const handleInteraction = (e) => {
                    const svg = svgRef.current;
                    if (!svg || instData.length === 0) return;

                    const rect = svg.getBoundingClientRect();
                    const clientX = e.clientX || (e.touches && e.touches[0].clientX);
                    
                    const xPos = ((clientX - rect.left) / rect.width) * width;

                    let closestIdx = 0;
                    let minDiff = Infinity;

                    instData.forEach((_, i) => {
                        const x = getX(i);
                        const diff = Math.abs(xPos - x);
                        if (diff < minDiff) {
                            minDiff = diff;
                            closestIdx = i;
                        }
                    });

                    setHoverInfo(instData[closestIdx]);
                };

                const activeIdx = hoverInfo ? instData.findIndex(d => d.id === hoverInfo.id) : -1;
                const activeX = activeIdx !== -1 ? getX(activeIdx) : 0;

                return (
                    <div className="relative group/chart">
                        <svg 
                            ref={svgRef}
                            viewBox={`0 0 ${width} ${height}`} 
                            className="w-full h-80 overflow-visible cursor-crosshair touch-none"
                            onMouseMove={handleInteraction}
                            onTouchMove={handleInteraction}
                            onMouseLeave={() => setHoverInfo(null)}
                        >
                            {/* Grade Horizontal */}
                            {[0, 10, 20, 30, 40, 50, 60].map(v => (
                                <g key={v}>
                                    <line x1={padding} y1={height - padding - (v * scaleFactor)} x2={width - rightMargin} y2={height - padding - (v * scaleFactor)} stroke="#f1f5f9" strokeWidth="2" />
                                    <text x={padding - 10} y={height - padding - (v * scaleFactor)} fontSize="10" textAnchor="end" dy="0.3em" fill="#94a3b8" fontWeight="bold">{v}%</text>
                                </g>
                            ))}
                            
                            {/* Linha Vertical de Guia Sincronizada */}
                            {hoverInfo && (
                                <line x1={activeX} y1={padding} x2={activeX} y2={height - padding} stroke={BRAND.orange} strokeWidth="1.5" strokeDasharray="4" />
                            )}

                            {Object.entries(candidates).map(([key, info]) => {
                                // Mapeia pontos válidos e ignora períodos em que o candidato não pontuou
                                const points = instData.map((d, i) => {
                                    const val = d.candidatos[key];
                                    if (val === 0 || val === null || isNaN(val)) return null;
                                    return {
                                        x: getX(i),
                                        y: height - padding - (val * scaleFactor),
                                        val: val
                                    };
                                }).filter(Boolean);

                                if (points.length === 0) return null;
                                const lastPoint = points[points.length - 1];

                                return (
                                    <g key={key}>
                                        {points.length > 1 && (
                                            <polyline points={points.map(p => `${p.x},${p.y}`).join(' ')} fill="none" stroke={info.color} strokeWidth="4" strokeLinecap="round" strokeLinejoin="round" className="opacity-80" />
                                        )}
                                        {points.map((p, i) => (
                                            <circle key={i} cx={p.x} cy={p.y} r={hoverInfo && Math.abs(activeX - p.x) < 2 ? "8" : "5"} fill={info.color} stroke="white" strokeWidth="2" className="transition-all" />
                                        ))}
                                        <g transform={`translate(${lastPoint.x + 12 + (xOffsets[key] || 0)}, ${lastPoint.y - 15})`}>
                                            <clipPath id={`clip-${instName.replace(/\s+/g, '')}-${key}`}>
                                                <circle r="15" />
                                            </clipPath>
                                            <circle r="15" fill={info.color} />
                                            {info.photo ? (
                                                <g>
                                                    <image href={info.photo} x="-15" y="-15" width="30" height="30" clipPath={`url(#clip-${instName.replace(/\s+/g, '')}-${key})`} preserveAspectRatio="xMidYMid slice" />
                                                    <circle r="15" fill="none" stroke={info.color} strokeWidth="3" />
                                                </g>
                                            ) : (
                                                <text fontSize="10" textAnchor="middle" dy=".3em" fill="white" fontWeight="900">{info.initials}</text>
                                            )}
                                        </g>
                                    </g>
                                );
                            })}

                            {instData.map((d, i) => {
                                const x = getX(i);
                                return <text key={i} x={x} y={height - 10} fontSize="10" textAnchor="middle" fill={activeIdx === i ? BRAND.orange : "#94a3b8"} fontWeight="900">{d.data.substring(0, 5)}</text>
                            })}
                        </svg>

                        {/* Tooltip com Ordenação por % */}
                        {hoverInfo && (
                            <div 
                                className="absolute top-0 z-40 bg-white shadow-xl border-2 border-jamildo-blue rounded-xl p-3 pointer-events-none w-44"
                                style={{ 
                                    left: activeX > width / 2 ? 'auto' : `${(activeX / width) * 100}%`,
                                    right: activeX > width / 2 ? `${100 - (activeX / width) * 100}%` : 'auto',
                                    transform: activeX > width / 2 ? 'translateX(10px)' : 'translateX(-10px)'
                                }}
                            >
                                <div className="text-[10px] font-black uppercase text-jamildo-orange border-b border-slate-100 pb-2 mb-2">
                                    Pesquisa em {hoverInfo.data}
                                </div>
                                <div className="space-y-2">
                                    {Object.entries(candidates)
                                        .filter(([key, _]) => hoverInfo.candidatos[key] > 0)
                                        .sort((a, b) => hoverInfo.candidatos[b[0]] - hoverInfo.candidatos[a[0]])
                                        .map(([key, info]) => (
                                        <div key={key} className="flex items-center justify-between gap-2">
                                            <div className="flex items-center gap-2">
                                                <div className={`w-2 h-2 rounded-full ${info.bg}`}></div>
                                                <span className="text-[10px] font-bold text-slate-600">{info.name.split(' ')[0]}</span>
                                            </div>
                                            <span className="text-[11px] font-black text-jamildo-blue">{hoverInfo.candidatos[key]}%</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            const CandidateAvatar = ({ info, size = "small" }) => {
                const sizeClass = size === "small" ? "w-10 h-10 text-[12px]" : "w-16 h-16 text-xl";
                return (
                    <div 
                        className={`${sizeClass} ${info.bg} rounded-full flex items-center justify-center text-white font-black shadow-sm shrink-0 border-2 overflow-hidden`}
                        style={{ borderColor: info.color }}
                    >
                        {info.photo ? <img src={info.photo} alt={info.name} className="w-full h-full object-cover" /> : info.initials}
                    </div>
                );
            };

            if (loading) return (
                <div className="min-h-screen flex items-center justify-center bg-slate-50">
                    <div className="flex items-center gap-3 animate-pulse">
                        <div className="w-4 h-4 bg-jamildo-orange rounded-full"></div>
                        <span className="font-black text-xs uppercase tracking-widest text-slate-400">Sincronizando Jamildo.com</span>
                    </div>
                </div>
            );

            const activeCandidates = Object.entries(candidates).filter(([_, info]) => info.active);
            const inactiveCandidates = Object.entries(candidates).filter(([_, info]) => !info.active);

            return (
                <div className="min-h-screen">
                    <header className="bg-jamildo-blue border-b-4 border-jamildo-orange sticky top-0 z-50 shadow-md">
                        <div className="max-w-6xl mx-auto px-4 py-3 flex flex-col md:flex-row items-center justify-between gap-6">
                            <div className="flex items-center gap-4">
                                <img src={BRAND.logoDark} alt="Jamildo.com" className="h-8 md:h-10 w-auto" />
                                <div className="flex flex-col border-l border-white/20 pl-4">
                                    <h1 className="text-white font-black text-sm md:text-lg uppercase tracking-tighter">Agregador de Pesquisas</h1>
                                    <p className="text-white/70 text-[9px] md:text-[11px] font-bold mt-1 uppercase tracking-tight">O portal Jamildo.com publica apenas levantamentos eleitorais registrados no TSE</p>
                                </div>
                            </div>
                            <nav className="flex gap-1 bg-white/10 p-1 rounded-xl">
                                <button onClick={() => setView('dashboard')} className={`px-5 py-2 rounded-lg text-[10px] font-black uppercase transition-all ${view === 'dashboard' ? 'bg-white text-jamildo-blue shadow' : 'text-white hover:bg-white/10'}`}>Painel</button>
                                <button onClick={() => setView('spreadsheet')} className={`px-5 py-2 rounded-lg text-[10px] font-black uppercase transition-all ${view === 'spreadsheet' ? 'bg-white text-jamildo-blue shadow' : 'text-white hover:bg-white/10'}`}>Dados</button>
                            </nav>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto p-4 md:p-8">
                        {view === 'dashboard' ? (
                            <div className="space-y-8">
                                
                                {/* Filtros e Seleção */}
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6 bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
                                    <div className="md:col-span-2 space-y-4">
                                        <label className="text-[10px] font-black uppercase text-jamildo-blue tracking-widest flex items-center gap-2">
                                            <BarChart size={14} className="text-jamildo-orange" /> Métodos de Visualização Dinâmica
                                        </label>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                            <div 
                                                onClick={() => setDisplayMode('all')}
                                                className={`cursor-pointer p-4 rounded-2xl border-2 transition-all flex flex-col justify-between ${displayMode === 'all' ? 'border-jamildo-orange bg-orange-50/30' : 'border-slate-200 bg-white hover:border-slate-300'}`}
                                            >
                                                <div>
                                                    <h3 className="font-black text-xs uppercase tracking-tight text-jamildo-blue">Pesquisas Recentes</h3>
                                                    <p className="text-[10px] text-slate-500 mt-1">O retrato atual das intenções de voto em Pernambuco</p>
                                                </div>
                                                <p className="text-xs text-slate-600 mt-3 leading-normal">
                                                    Exibe o último gráfico de barras de cada instituto. Essa visão mostra a foto do momento eleitoral.
                                                </p>
                                            </div>
                                            <div 
                                                onClick={() => setDisplayMode('evolution')}
                                                className={`cursor-pointer p-4 rounded-2xl border-2 transition-all flex flex-col justify-between ${displayMode === 'evolution' ? 'border-jamildo-orange bg-orange-50/30' : 'border-slate-200 bg-white hover:border-slate-300'}`}
                                            >
                                                <div>
                                                    <h3 className="font-black text-xs uppercase tracking-tight text-jamildo-blue">Linha do Tempo</h3>
                                                    <p className="text-[10px] text-slate-500 mt-1">Tendências históricas de crescimento e queda</p>
                                                </div>
                                                <p className="text-xs text-slate-600 mt-3 leading-normal">
                                                    Desenha uma linha histórica com todos os dados. Essa opção compara o instituto com ele mesmo para revelar tendências de movimentação.
                                                </p>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="space-y-4">
                                        <label className="text-[10px] font-black uppercase text-jamildo-blue tracking-widest flex items-center gap-2">
                                            <Filter size={14} className="text-jamildo-orange" /> Filtrar Metodologia
                                        </label>
                                        <div className="flex flex-col gap-2 text-[11px] font-black">
                                            {['Todos', 'Presencial', 'Telefone', 'Internet'].map(m => (
                                                <button 
                                                    key={m} 
                                                    onClick={() => setFilterMetodologia(m)} 
                                                    className={`w-full py-3 rounded-xl border-2 transition-all text-center uppercase tracking-wider ${filterMetodologia === m ? 'bg-jamildo-blue border-jamildo-blue text-white' : 'bg-white border-slate-200 text-slate-500 hover:border-jamildo-blue'}`}
                                                >
                                                    {m}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                </div>

                                {/* Orientações Editoriais e Metodológicas */}
                                <section className="bg-jamildo-orange text-white p-6 rounded-2xl shadow-lg">
                                    <div className="flex items-center gap-3 mb-4">
                                        <AlertTriangle size={24} className="shrink-0" />
                                        <h2 className="font-black text-sm uppercase tracking-widest italic">Aviso Importante ao Eleitor</h2>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8 text-[14px] opacity-95 leading-normal">
                                        <div className="space-y-4">
                                            <p className="font-bold text-white">Não compare pesquisas de institutos diferentes. Cada empresa adota metodologias de coleta, amostragem e pesos de ponderação demográfica específicos. A leitura correta exige o acompanhamento das variações de um mesmo instituto ao longo da série histórica.</p>
                                            <p>As pesquisas telefônicas, presenciais ou de internet apresentam dinâmicas de captação distintas. Esse fator altera naturalmente os índices finais e inviabiliza o confronto direto entre elas.</p>
                                        </div>
                                        <div className="space-y-4">
                                            <p>Alterações no rol de candidatos modificam o cenário estimulado. A desistência ou inserção de nomes redistribui os votos remanescentes. O monitor destaca que a mudança na composição dos questionários impede comparações cegas de percentuais históricos.</p>
                                            <p>Em caso de empate técnico na série histórica da Linha do Tempo, o gráfico desloca horizontalmente os avatares. O recurso impede que as fotos fiquem sobrepostas e assegura a visibilidade integral das informações.</p>
                                        </div>
                                    </div>
                                </section>

                                {/* Perfis dos Candidatos Ativos */}
                                <section className="space-y-4">
                                    <h3 className="text-[10px] font-black uppercase text-slate-400 tracking-wider">Candidatos Acompanhados no Monitor</h3>
                                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                        {activeCandidates.map(([key, info]) => (
                                            <div key={key} className="bg-white p-5 rounded-2xl border-b-4 border-slate-200 shadow-sm flex flex-col items-center hover:border-jamildo-orange transition-all group">
                                                <CandidateAvatar info={info} size="large" />
                                                <span className="text-[10px] font-black uppercase text-slate-300 mt-4 mb-1 tracking-wider">Pernambuco 2026</span>
                                                <span className="text-sm font-black text-jamildo-blue mb-1">{info.name}</span>
                                            </div>
                                        ))}
                                    </div>
                                    
                                    {/* Nota de Desistência para Eduardo Moura */}
                                    <div className="mt-4">
                                        {inactiveCandidates.map(([key, info]) => (
                                            <div key={key} className="bg-slate-100 p-4 rounded-xl border border-slate-200 flex flex-col md:flex-row items-center gap-4 text-center md:text-left font-sans">
                                                <div className="relative shrink-0">
                                                    <CandidateAvatar info={info} size="small" />
                                                    <div className="absolute inset-0 bg-slate-900/40 rounded-full flex items-center justify-center text-[9px] text-white font-black uppercase tracking-wider">Saída</div>
                                                </div>
                                                <div className="space-y-1">
                                                    <span className="text-[9px] font-black uppercase text-slate-400 tracking-wider">Pré-candidatura Retirada</span>
                                                    <h4 className="text-xs font-black text-[#024796]">{info.name}</h4>
                                                    <p className="text-xs text-slate-500 leading-relaxed max-w-4xl">{info.note}</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </section>

                                {/* Cards de Exibição dos Institutos */}
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    {institutes.map(inst => {
                                        const instHistory = filteredData.filter(d => d.instituto === inst);
                                        const latest = instHistory[instHistory.length - 1];
                                        
                                        return (
                                            <div key={inst} className="bg-white p-6 rounded-2xl border-t-8 border-jamildo-blue shadow-md flex flex-col hover:shadow-xl transition-shadow relative">
                                                <div className="mb-6 flex justify-between items-start">
                                                    <div>
                                                        <h3 className="font-black text-2xl text-jamildo-blue tracking-tighter uppercase italic">{inst}</h3>
                                                        <div className="flex flex-wrap gap-2 mt-2">
                                                            <span className="text-[10px] font-black px-2 py-1 rounded bg-blue-50 text-jamildo-blue uppercase font-black">Divulgação: {latest.data}</span>
                                                            <span className="text-[10px] font-black px-2 py-1 rounded bg-slate-100 text-slate-600 uppercase">Método: {latest.metodologia}</span>
                                                            <span className="text-[10px] font-black px-2 py-1 rounded bg-orange-50 text-jamildo-orange uppercase">TSE: {latest.registro}</span>
                                                        </div>
                                                    </div>
                                                </div>
                                                <div className="flex-1 min-h-[300px] mb-8 flex flex-col justify-center">
                                                    {displayMode === 'evolution' ? (
                                                        <div className="space-y-4">
                                                            <p className="text-[10px] font-bold text-slate-400 uppercase tracking-wider text-center">Gráfico Histórico de Tendência</p>
                                                            <RenderEvolutionChart instData={instHistory} instName={inst} />
                                                        </div>
                                                    ) : (
                                                        <div className="space-y-6">
                                                            {/* Lista Principal Ordenada por Porcentagem */}
                                                            {Object.entries(candidates)
                                                                .filter(([key, info]) => latest.candidatos[key] > 0 || info.active)
                                                                .sort((a, b) => latest.candidatos[b[0]] - latest.candidatos[a[0]])
                                                                .map(([key, info]) => (
                                                                <div key={key} className="flex items-center gap-4 group">
                                                                    <CandidateAvatar info={info} />
                                                                    <div className="flex-1">
                                                                        <div className="flex justify-between text-[11px] font-black uppercase mb-1.5">
                                                                            <span className="text-slate-500 group-hover:text-jamildo-blue flex items-center gap-1.5">
                                                                                {info.name}
                                                                                {info.note && <span className="text-[8px] font-bold text-blue-500 bg-blue-50 px-1.5 py-0.5 rounded">* Inativo</span>}
                                                                            </span>
                                                                            <span className="text-jamildo-blue font-black">{latest.candidatos[key]}%</span>
                                                                        </div>
                                                                        <div className="w-full h-4 bg-slate-100 rounded-full overflow-hidden border border-slate-200">
                                                                            <div className={`h-full ${info.bg} transition-all duration-1000`} style={{ width: `${latest.candidatos[key]}%` }} />
                                                                        </div>
                                                                    </div>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    )}
                                                </div>
                                                <div className="pt-6 border-t border-slate-100 space-y-6 text-center">
                                                    <a href={latest.link} target="_blank" className="block w-full py-4 bg-jamildo-blue hover:bg-jamildo-orange text-white text-[11px] font-black uppercase tracking-widest rounded-xl transition-all shadow-md text-center font-black">Ver matéria no jamildo.com</a>
                                                    <div className="grid grid-cols-2 gap-4 text-left">
                                                        <div className="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                                                            <span className="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 leading-none">Brancos / Nulos</span>
                                                            <span className="text-2xl font-black text-jamildo-blue leading-none">{latest.brancos}%</span>
                                                        </div>
                                                        <div className="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                                                            <span className="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 leading-none">Indecisos</span>
                                                            <span className="text-2xl font-black text-jamildo-blue leading-none">{latest.isUnified ? 'Unificado' : `${latest.indecisos}%`}</span>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        ) : (
                            <div className="bg-white rounded-2xl border border-slate-200 shadow-xl overflow-hidden">
                                <div className="p-6 border-b-4 border-jamildo-blue bg-slate-50 font-black text-sm uppercase text-jamildo-blue tracking-widest">Base de Dados Importada do Google Sheets</div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left border-collapse text-[13px]">
                                        <thead>
                                            <tr className="bg-slate-50 border-b border-slate-200 text-slate-500 uppercase text-[10px] font-black">
                                                <th className="p-5">Data</th>
                                                <th className="p-5">Instituto</th>
                                                <th className="p-5">Raquel</th>
                                                <th className="p-5">João</th>
                                                <th className="p-5">Renan</th>
                                                <th className="p-5">Eduardo</th>
                                                <th className="p-5">Ivan</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {data.map(d => (
                                                <tr key={d.id} className="border-b border-slate-100 hover:bg-slate-50 transition-colors font-bold">
                                                    <td className="p-5 text-slate-400">{d.data}</td>
                                                    <td className="p-5 text-jamildo-blue uppercase font-black tracking-tight">{d.instituto}</td>
                                                    <td className="p-5 text-purple-700">{d.candidatos.raquel}%</td>
                                                    <td className="p-5 text-yellow-600">{d.candidatos.joao}%</td>
                                                    <td className="p-5 text-teal-700">{d.candidatos.renan}%</td>
                                                    <td className="p-5 text-slate-500">{d.candidatos.eduardo}%</td>
                                                    <td className="p-5 text-red-600">{d.candidatos.ivan}%</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                    </main>
                    <footer className="max-w-6xl mx-auto px-4 py-16 text-center border-t border-slate-200 mt-16 opacity-30 grayscale italic text-[11px] font-black uppercase tracking-[0.5em]">Jornalismo de Dados Jamildo.com</footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
