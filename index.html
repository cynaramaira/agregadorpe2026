<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agregador de Pesquisas - Jamildo.com</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .bg-jamildo-blue { background-color: #024796; }
        .bg-jamildo-orange { background-color: #f83d03; }
        .text-jamildo-blue { color: #024796; }
        .text-jamildo-orange { color: #f83d03; }
        .border-jamildo-orange { border-color: #f83d03; }
        .border-jamildo-blue { border-color: #024796; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 leading-tight">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTnf0fzqhxBmiOIvX3vXHQsf_JSIbs1ooA_-Wyj5OcQy647rserlTvTVrYO86StVyA0kFeczCcpoqTP/pub?output=csv";

        const BRAND = {
            orange: '#f83d03',
            blue: '#024796',
            logoDark: 'https://jamildo.com/media/uploads/brancologojamildo_6xe6mA0.png'
        };

        const App = () => {
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(true);
            const [view, setView] = useState('dashboard');
            const [displayMode, setDisplayMode] = useState('all');
            const [filterMetodologia, setFilterMetodologia] = useState('Todos');

            const candidates = {
                raquel: { 
                    name: 'Raquel Lyra', 
                    color: '#9333ea', 
                    bg: 'bg-purple-600', 
                    initials: 'RL',
                    photo: 'raquel-lyra.webp'
                },
                joao: { 
                    name: 'João Campos', 
                    color: '#eab308', 
                    bg: 'bg-yellow-500', 
                    initials: 'JC',
                    photo: 'joao-campos.jpg'
                },
                eduardo: { 
                    name: 'Eduardo Moura', 
                    color: '#2563eb', 
                    bg: 'bg-blue-600', 
                    initials: 'EM',
                    photo: 'eduardo-moura.jpeg',
                    note: "Candidato à Câmara dos Deputados. Este nome constou nos questionários até abril de 2026."
                },
                ivan: { 
                    name: 'Ivan Moraes', 
                    color: '#dc2626', 
                    bg: 'bg-red-600', 
                    initials: 'IM',
                    photo: 'ivan-moraes.jpeg'
                }
            };

            useEffect(() => {
                fetchData();
            }, []);

            const fetchData = async () => {
                try {
                    const response = await fetch(CSV_URL);
                    const text = await response.text();
                    const rows = text.split('\n').filter(r => r.trim() !== '').slice(1);
                    
                    const parsed = rows.map((row, idx) => {
                        const cols = row.split(',').map(c => c.trim());
                        if (cols.length < 8) return null;

                        const parseNum = (val) => {
                            const n = parseFloat(val?.replace(',', '.') || 0);
                            return isNaN(n) ? 0 : n;
                        };

                        const instituto = cols[1];
                        return {
                            id: idx,
                            data: cols[0],
                            instituto: instituto,
                            registro: cols[2],
                            link: cols[3],
                            candidatos: {
                                raquel: parseNum(cols[4]),
                                joao: parseNum(cols[5]),
                                eduardo: parseNum(cols[6]),
                                ivan: parseNum(cols[7])
                            },
                            brancos: parseNum(cols[8]),
                            indecisos: cols[9] ? parseNum(cols[9]) : 0,
                            metodologia: instituto.toLowerCase().includes('real time') || instituto.toLowerCase().includes('simplex') ? 'Telefone' : 'Presencial',
                            isUnified: instituto.toLowerCase().includes('real time')
                        };
                    }).filter(Boolean);

                    setData(parsed);
                } catch (err) {
                    console.error("Erro na importação.");
                } finally {
                    setLoading(false);
                }
            };

            const filteredData = useMemo(() => {
                const base = filterMetodologia === 'Todos' ? data : data.filter(d => d.metodologia === filterMetodologia);
                return [...base].sort((a, b) => {
                    const dateA = a.data.split('.').reverse().join('-');
                    const dateB = b.data.split('.').reverse().join('-');
                    return new Date(dateA) - new Date(dateB);
                });
            }, [data, filterMetodologia]);

            const institutes = useMemo(() => {
                const list = [...new Set(filteredData.map(d => d.instituto))];
                
                const latestDates = {};
                list.forEach(inst => {
                    const instData = filteredData.filter(d => d.instituto === inst);
                    const latest = instData[instData.length - 1];
                    latestDates[inst] = new Date(latest.data.split('.').reverse().join('-'));
                });

                return list.sort((a, b) => latestDates[b] - latestDates[a]);
            }, [filteredData]);

            const RenderEvolutionChart = ({ instData }) => {
                const width = 400;
                const height = 350;
                const padding = 50;
                const scaleFactor = 4.5;

                return (
                    <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-72 overflow-visible">
                        {[0, 10, 20, 30, 40, 50, 60].map(v => (
                            <line key={v} x1={padding} y1={height - padding - (v * scaleFactor)} x2={width - padding} y2={height - padding - (v * scaleFactor)} stroke="#f1f5f9" strokeWidth="2" />
                        ))}
                        {Object.entries(candidates).map(([key, info]) => {
                            const points = instData.map((d, i) => {
                                const x = instData.length > 1 ? padding + (i * (width - 2 * padding) / (instData.length - 1)) : width / 2;
                                const y = height - padding - (d.candidatos[key] * scaleFactor);
                                return { x, y };
                            });
                            const lastPoint = points[points.length - 1];
                            return (
                                <g key={key}>
                                    {instData.length > 1 && (
                                        <polyline points={points.map(p => `${p.x},${p.y}`).join(' ')} fill="none" stroke={info.color} strokeWidth="4" strokeLinecap="round" strokeLinejoin="round" />
                                    )}
                                    {points.map((p, i) => (
                                        <circle key={i} cx={p.x} cy={p.y} r="6" fill={info.color} stroke="white" strokeWidth="2" />
                                    ))}
                                    <g transform={`translate(${lastPoint.x + 12}, ${lastPoint.y - 15})`}>
                                        {info.photo ? (
                                            <clipPath id={`clip-${key}`}>
                                                <circle r="15" />
                                            </clipPath>
                                        ) : null}
                                        <circle r="15" fill={info.color} stroke="white" strokeWidth="2" />
                                        {info.photo ? (
                                            <image 
                                                href={info.photo} 
                                                x="-15" y="-15" 
                                                width="30" height="30" 
                                                clipPath={`url(#clip-${key})`}
                                                preserveAspectRatio="xMidYMid slice"
                                            />
                                        ) : (
                                            <text fontSize="10" textAnchor="middle" dy=".3em" fill="white" fontWeight="900">{info.initials}</text>
                                        )}
                                    </g>
                                </g>
                            );
                        })}
                        {instData.map((d, i) => {
                            const x = instData.length > 1 ? padding + (i * (width - 2 * padding) / (instData.length - 1)) : width / 2;
                            return <text key={i} x={x} y={height - 10} fontSize="10" textAnchor="middle" fill="#94a3b8" fontWeight="900">{d.data.substring(0, 5)}</text>
                        })}
                    </svg>
                );
            };

            const CandidateAvatar = ({ info, size = "small" }) => {
                const sizeClass = size === "small" ? "w-10 h-10 text-[12px]" : "w-16 h-16 text-xl";
                return (
                    <div className={`${sizeClass} ${info.bg} rounded-full flex items-center justify-center text-white font-black shadow-sm shrink-0 border-2 border-white overflow-hidden`}>
                        {info.photo ? (
                            <img src={info.photo} alt={info.name} className="w-full h-full object-cover" />
                        ) : (
                            info.initials
                        )}
                    </div>
                );
            };

            if (loading) return (
                <div className="min-h-screen flex items-center justify-center bg-slate-50">
                    <div className="flex items-center gap-3 animate-pulse">
                        <div className="w-4 h-4 bg-jamildo-orange rounded-full"></div>
                        <span className="font-black text-xs uppercase tracking-widest text-slate-400">Sincronizando Jamildo.com</span>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen">
                    <header className="bg-jamildo-blue border-b-4 border-jamildo-orange sticky top-0 z-30 shadow-md">
                        <div className="max-w-6xl mx-auto px-4 py-3 flex flex-col md:flex-row items-center justify-between gap-6">
                            <div className="flex items-center gap-4">
                                <img src={BRAND.logoDark} alt="Jamildo.com" className="h-8 md:h-10 w-auto" />
                                <div className="flex flex-col border-l border-white/20 pl-4">
                                    <h1 className="text-white font-black text-sm md:text-lg uppercase tracking-tighter">Agregador de Pesquisas</h1>
                                    <p className="text-white/70 text-[9px] md:text-[11px] font-bold mt-1">Apenas pesquisas com registro do TSE que o Jamildo.com publica</p>
                                </div>
                            </div>
                            <nav className="flex gap-1 bg-white/10 p-1 rounded-xl">
                                <button onClick={() => setView('dashboard')} className={`px-5 py-2 rounded-lg text-[10px] font-black uppercase transition-all ${view === 'dashboard' ? 'bg-white text-jamildo-blue shadow' : 'text-white hover:bg-white/10'}`}>Painel</button>
                                <button onClick={() => setView('spreadsheet')} className={`px-5 py-2 rounded-lg text-[10px] font-black uppercase transition-all ${view === 'spreadsheet' ? 'bg-white text-jamildo-blue shadow' : 'text-white hover:bg-white/10'}`}>Dados</button>
                            </nav>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto p-4 md:p-8">
                        {view === 'dashboard' ? (
                            <div className="space-y-8">
                                <section className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                    {Object.entries(candidates).map(([key, info]) => (
                                        <div key={key} className="bg-white p-6 rounded-2xl border-b-4 border-slate-200 shadow-sm flex flex-col items-center hover:border-jamildo-orange transition-all group">
                                            <CandidateAvatar info={info} size="large" />
                                            <span className="text-[10px] font-black uppercase text-slate-300 mt-4 mb-1">PE 2026</span>
                                            <span className="text-sm font-black text-jamildo-blue mb-2">{info.name}</span>
                                            {info.note && (
                                                <div className="mt-2 p-2 bg-blue-50 border border-blue-100 rounded-lg">
                                                    <p className="text-[9px] font-bold text-blue-700 leading-tight text-center italic">{info.note}</p>
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </section>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                                    <div className="space-y-4">
                                        <label className="text-[10px] font-black uppercase text-jamildo-blue tracking-widest">Visualização</label>
                                        <div className="flex gap-2 p-1 bg-slate-100 rounded-xl border border-slate-200 text-[11px] font-black">
                                            <button onClick={() => setDisplayMode('all')} className={`flex-1 px-4 py-3 rounded-lg transition-all ${displayMode === 'all' ? 'bg-jamildo-orange shadow text-white' : 'text-slate-500'}`}>Recentes</button>
                                            <button onClick={() => setDisplayMode('evolution')} className={`flex-1 px-4 py-3 rounded-lg transition-all ${displayMode === 'evolution' ? 'bg-jamildo-orange shadow text-white' : 'text-slate-500'}`}>Linha do Tempo</button>
                                        </div>
                                    </div>
                                    <div className="space-y-4">
                                        <label className="text-[10px] font-black uppercase text-jamildo-blue tracking-widest">Metodologia</label>
                                        <div className="flex gap-2 text-[11px] font-black">
                                            {['Todos', 'Presencial', 'Telefone'].map(m => (
                                                <button key={m} onClick={() => setFilterMetodologia(m)} className={`flex-1 py-3 rounded-xl border-2 transition-all ${filterMetodologia === m ? 'bg-jamildo-blue border-jamildo-blue text-white' : 'bg-white border-slate-200 text-slate-500'}`}>{m}</button>
                                            ))}
                                        </div>
                                    </div>
                                </div>

                                <section className="bg-jamildo-orange text-white p-6 rounded-2xl shadow-lg">
                                    <h2 className="font-black text-sm uppercase tracking-widest italic mb-4">Orientações de Análise</h2>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8 text-[14px] opacity-95">
                                        <p>O eleitor deve evitar a comparação direta entre institutos diferentes. Cada empresa utiliza cálculos de amostragem específicos. A leitura correta exige a análise da evolução de um mesmo instituto ao longo do tempo. Metodologias presenciais e telefônicas apresentam variações naturais.</p>
                                        <p>Mudanças no número de candidatos impactam os resultados. A decisão de Eduardo Moura em focar na disputa para deputado mudará o cenário. O usuário não deve comparar períodos com listas de concorrentes distintas. O remanejamento de votos altera as porcentagens.</p>
                                    </div>
                                </section>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    {institutes.map(inst => {
                                        const instHistory = filteredData.filter(d => d.instituto === inst);
                                        const latest = instHistory[instHistory.length - 1];
                                        
                                        return (
                                            <div key={inst} className="bg-white p-6 rounded-2xl border-t-8 border-jamildo-blue shadow-md flex flex-col hover:shadow-xl transition-shadow">
                                                <div className="mb-6 flex justify-between items-start">
                                                    <div>
                                                        <h3 className="font-black text-2xl text-jamildo-blue tracking-tighter uppercase italic">{inst}</h3>
                                                        <div className="flex flex-wrap gap-2 mt-2">
                                                            <span className="text-[10px] font-black px-2 py-1 rounded bg-blue-50 text-jamildo-blue uppercase">Divulgação: {latest.data}</span>
                                                            <span className="text-[10px] font-black px-2 py-1 rounded bg-slate-100 text-slate-600 uppercase">{latest.metodologia}</span>
                                                            <span className="text-[10px] font-black px-2 py-1 rounded bg-orange-50 text-jamildo-orange uppercase">TSE: {latest.registro}</span>
                                                        </div>
                                                    </div>
                                                </div>
                                                <div className="flex-1 min-h-[300px] mb-8 flex flex-col justify-center">
                                                    {displayMode === 'evolution' ? <RenderEvolutionChart instData={instHistory} /> : (
                                                        <div className="space-y-6">
                                                            {Object.entries(candidates).map(([key, info]) => (
                                                                <div key={key} className="flex items-center gap-4 group">
                                                                    <CandidateAvatar info={info} />
                                                                    <div className="flex-1">
                                                                        <div className="flex justify-between text-[11px] font-black uppercase mb-1.5">
                                                                            <span className="text-slate-500 group-hover:text-jamildo-blue">
                                                                                {info.name}
                                                                                {info.note && <span className="ml-2 text-[8px] font-bold text-blue-500 italic opacity-60">*</span>}
                                                                            </span>
                                                                            <span className="text-jamildo-blue">{latest.candidatos[key]}%</span>
                                                                        </div>
                                                                        <div className="w-full h-4 bg-slate-100 rounded-full overflow-hidden border border-slate-200">
                                                                            <div className={`h-full ${info.bg} transition-all duration-1000`} style={{ width: `${latest.candidatos[key]}%` }} />
                                                                        </div>
                                                                    </div>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    )}
                                                </div>
                                                <div className="pt-6 border-t border-slate-100 space-y-6 text-center">
                                                    <a href={latest.link} target="_blank" className="block w-full py-4 bg-jamildo-blue hover:bg-jamildo-orange text-white text-[11px] font-black uppercase tracking-widest rounded-xl transition-all shadow-md text-center">Ver matéria no jamildo.com</a>
                                                    <div className="grid grid-cols-2 gap-4 text-left">
                                                        <div className="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                                                            <span className="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Brancos</span>
                                                            <span className="text-2xl font-black text-jamildo-blue">{latest.brancos}%</span>
                                                        </div>
                                                        <div className="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                                                            <span className="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Indecisos</span>
                                                            <span className="text-2xl font-black text-jamildo-blue">{latest.isUnified ? 'Unificado' : `${latest.indecisos}%`}</span>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        ) : (
                            <div className="bg-white rounded-2xl border border-slate-200 shadow-xl overflow-hidden">
                                <div className="p-6 border-b-4 border-jamildo-blue bg-slate-50 font-black text-sm uppercase text-jamildo-blue tracking-widest">Base de Dados Importada</div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left border-collapse text-[13px]">
                                        <thead>
                                            <tr className="bg-slate-50 border-b border-slate-200 text-slate-500 uppercase text-[10px] font-black">
                                                <th className="p-5">Data</th>
                                                <th className="p-5">Instituto</th>
                                                <th className="p-5">Raquel</th>
                                                <th className="p-5">João</th>
                                                <th className="p-5">Eduardo</th>
                                                <th className="p-5">Ivan</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {data.map(d => (
                                                <tr key={d.id} className="border-b border-slate-100 hover:bg-slate-50 transition-colors font-bold">
                                                    <td className="p-5 text-slate-400">{d.data}</td>
                                                    <td className="p-5 text-jamildo-blue">{d.instituto}</td>
                                                    <td className="p-5 text-purple-700">{d.candidatos.raquel}%</td>
                                                    <td className="p-5 text-yellow-600">{d.candidatos.joao}%</td>
                                                    <td className="p-5 text-slate-600">{d.candidatos.eduardo}%</td>
                                                    <td className="p-5 text-slate-600">{d.candidatos.ivan}%</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                    </main>
                    <footer className="max-w-6xl mx-auto px-4 py-16 text-center border-t border-slate-200 mt-16 opacity-30 grayscale italic text-[11px] font-black uppercase tracking-[0.5em]">Jornalismo de Dados Jamildo.com</footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
